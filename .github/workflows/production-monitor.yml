name: Production Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  monitor:
    name: Check SaaSScout production demo
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install monitor dependency
        run: python -m pip install --upgrade requests

      - name: Run production monitor
        run: python scripts/production_monitor.py --site-url https://saas-intelligence-copilot-calvi.netlify.app --timeout 45
